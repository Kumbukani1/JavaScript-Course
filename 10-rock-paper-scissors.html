<!DOCTYPE html>
<html>
  <head>
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="Styles/10-rock-paper-scissors.css">
  </head>
  <body>
    <p>Rock-Paper-Scissors</p>

    <button onclick="playGame('Rock')"
    class="move-button">
      <img src="Images/rock-emoji.png" class="move-icon"></button>
    <button onclick="playGame('Paper')"
    class="move-button">
      <img src="Images/paper-emoji.png"
      class="move-icon"></button>
    <button onclick="playGame('Scissors')"
    class="move-button">
      <img src="Images/scissors-emoji.png"
      class="move-icon"></button>

    <p class="js-results results"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScore();
    " class="reset-score-button">Reset Score</button>

    <script src="Scripts/10-rock-paper-scissors.js"></script>
  </body>
</html>
